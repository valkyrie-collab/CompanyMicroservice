version: "3.8"

services:
  postgres:
    image: postgres:latest
    environment:
      POSTGRES_USER: valkyrie
      POSTGRES_PASSWORD: valkyrie1234
      POSTGRES_DB:  valkyrieDB
    ports:
      - "5433:5432"
    networks:
      - my-network
    volumes:
      - postgres-volume:/var/lib/postgresql/data
      - ./dbms/dbms.sql:/docker-entrypoint-initdb.d/dbms.sql

  api-gateway:
    build: ./api-gateway
    ports:
      - "8080:8080"
    depends_on:
      - authentication-service
      - employee-service
      - job-service
    environment:
      JWTS_SECURITY: HG8cTeEIEU4IAJGUFZQqE20bC8NaX4FtjJ7A55kQFBA=
      PORT: 8080
    networks:
      - my-network

  authentication-service:
    build: ./authentication-service
    ports:
      - "8083:8083"
    depends_on:
      - postgres
    environment:
      URL: jdbc:postgresql://postgres:5432/authentication
      USERNAME: valkyrie
      PASSWORD: valkyrie1234
      JWTS_SECURITY: HG8cTeEIEU4IAJGUFZQqE20bC8NaX4FtjJ7A55kQFBA=
      PORT: 8083
    networks:
      - my-network

  employee-service:
    build: ./employee-service
    ports:
      - "8082:8082"
    depends_on:
      - postgres
    environment:
      URL: jdbc:postgresql://postgres:5432/employee
      USERNAME: valkyrie
      PASSWORD: valkyrie1234
      PORT: 8082
    networks:
      - my-network

  job-service:
    build: ./job-service
    ports:
      - "8081:8081"
    depends_on:
      - postgres
    environment:
      URL: jdbc:postgresql://postgres:5432/job
      USERNAME: valkyrie
      PASSWORD: valkyrie1234
      PORT: 8081
    networks:
      - my-network

  service-registry:
    build: ./service-registry
    ports:
      - "8761:8761"
    environment:
      HOSTNAME: service-registry
      PORT: 8761
    networks:
      - my-network

volumes:
  postgres-volume:

networks:
  my-network:
    driver: bridge